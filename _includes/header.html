<header class="site-header">
  <a class="site-title" href="{{ '/' | relative_url }}">{{ site.author.name }}</a>
  <nav class="site-nav" aria-label="Primary navigation">
    {% for item in site.nav %}
      <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
    {% endfor %}
  </nav>
</header>
